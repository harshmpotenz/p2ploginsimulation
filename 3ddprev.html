
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>3D Canvas Wrap – Full 4 Side Fold (Ratio Preserved) – Fixed Back Folds Alignment</title>
    <style>
        body {
            background: #e5e5e5;
            font-family: Arial, sans-serif;
            padding: 30px;
            margin: 0;
        }

        .controls {
            background: white;
            padding: 18px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        label {
            display: inline-block;
            margin: 8px 16px 8px 0;
        }

        input[type="number"] {
            width: 100px;
            padding: 4px;
        }

        #threeContainer {
            width: min(90vw, 600px);
            height: min(90vw, 600px);
            background: #ffffff;
            border-radius: 10px;
            overflow: hidden;
            margin: 25px auto;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        h3 {
            margin-top: 1.5em;
        }

        #threeContainer {
            touch-action: none;
            /* prevent page scroll while dragging */
        }

        @media (max-width: 600px) {

            input,
            label {
                font-size: 16px;
                /* prevents iOS zoom on focus */
            }
        }
    </style>
</head>

<body>
    <div class="controls">
        <h3>Canvas Wrap Controls</h3>
        <input type="file" id="upload" accept="image/*"><br><br>
        <label>Front Width <input type="number" id="fWidth" value="1200"></label>
        <label>Front Height <input type="number" id="fHeight" value="1200"></label>
        <label>Depth <input type="number" id="depth" value="125"></label><br>
        <label>Preview Ratio <input type="number" id="ratio" value="1" step="0.1"></label>
        <label>Scale <input type="number" id="scale" value="1" step="0.1"></label><br>
        <label>Frame Color <input type="color" id="frameColor" value="#171717"></label><br>
        <label>Horizontal Offset <input type="number" id="leftOffset" value="0"> (positive = right)</label><br>
        <label>Vertical Offset <input type="number" id="topOffset" value="0"> (positive = down)</label>
        <h4>Image Size</h4>
        <label>Image Width <input type="number" id="imgWidth"></label>
        <label>Image Height <input type="number" id="imgHeight"></label><br>
        <label>Canvas Img Width <input type="number" id="canvasImgWidth"></label>
        <label>Canvas Img Height <input type="number" id="canvasImgHeight"></label><br>
        <label>Back Fold (px) <input type="number" id="backFold" value="125"></label>
        <label><input type="checkbox" id="lockAspect" checked> Lock Aspect</label>
        <label><input type="checkbox" id="useCustomSize"> Use Custom Image Size</label>
    </div>

    <h3>Interactive 3D Preview (drag to rotate • scroll to zoom)</h3>
    <div id="threeContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script>
        const upload = document.getElementById("upload");
        const fWidthInput = document.getElementById("fWidth");
        const fHeightInput = document.getElementById("fHeight");
        const depthInput = document.getElementById("depth");
        const ratioInput = document.getElementById("ratio");
        const scaleInput = document.getElementById("scale");
        const leftOffsetInput = document.getElementById("leftOffset");
        const topOffsetInput = document.getElementById("topOffset");
        const imgWidthInput = document.getElementById("imgWidth");
        const imgHeightInput = document.getElementById("imgHeight");
        const canvasImgWidthInput = document.getElementById("canvasImgWidth");
        const canvasImgHeightInput = document.getElementById("canvasImgHeight");
        const lockAspect = document.getElementById("lockAspect");
        const useCustomSize = document.getElementById("useCustomSize");
        const backFoldInput = document.getElementById("backFold");
        const frameColorInput = document.getElementById("frameColor");

        let imageURL = null, loadedImg = null;
        let origW = 0, origH = 0, aspect = 1;

        const container = document.getElementById("threeContainer");

        //======================================   EXTENAL EVENT FOR MOBILE TOUCH DEVICES   ======================================
        let lastTouchDistance = null;
        let isPinching = false;

        container.addEventListener("touchstart", (e) => {
            if (e.touches.length === 2) {
                e.preventDefault();
                isPinching = true;

                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                lastTouchDistance = Math.hypot(dx, dy);
            }
        }, { passive: false });

        container.addEventListener("touchmove", (e) => {
            if (e.touches.length === 2 && isPinching) {
                e.preventDefault();

                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.hypot(dx, dy);

                if (lastTouchDistance !== null) {
                    const delta = lastTouchDistance - dist;

                    camera.fov = THREE.MathUtils.clamp(camera.fov + delta * 0.08, 20, 110);
                    camera.updateProjectionMatrix();
                }

                lastTouchDistance = dist;
            }
        }, { passive: false });

        container.addEventListener("touchend", (e) => {
            if (e.touches.length < 2) {
                isPinching = false;
                lastTouchDistance = null;
            }
        });

        // ── Three.js setup ──────────────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 2000);
        camera.position.set(4, 2.5, 9);
        camera.lookAt(0, 0, 0);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        container.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 1.6));

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
        dirLight.position.set(10, 15, 10);
        scene.add(dirLight);

        const frontLight = new THREE.DirectionalLight(0xffffff, 0.8);
        frontLight.position.set(0, 0, 10);
        scene.add(frontLight);

        const wrapGroup = new THREE.Group();
        scene.add(wrapGroup);
        let currentMesh = null;

        // ── FIXED FRAME PROFILE (real mm values from image + confirmed front-face 43)
        // A=26mm → stretcher bar thickness (woodThickness)
        // B=41mm → hookLength
        // C=9mm  → (not used in frame profile – could be inner lip or fabric allowance)
        // D=19mm → canvasGap (space between canvas edge and inner frame)
        // O=11mm → hookThickness
        // frontFaceWidth remains 43 as explicitly stated ("from the front the thickness of the frame is 43px real value")
        const MM_PER_INCH = 25.4;
        const PX_PER_INCH = 96;
   

        function mmToPx(mm) {
            return (mm / MM_PER_INCH) * PX_PER_INCH;
        }

        // Active frame model based on the clarified A/B/C/D/O measurements.
        const FRAME_SPEC = Object.freeze({
            frontFacePx: 43,
            sideDepthPx: 159,
            backBorderPx: mmToPx(26),
            hookLengthPx: mmToPx(41),
            innerDepthPx: mmToPx(9),
            canvasGapPx: mmToPx(10),
            hookOffsetPx: mmToPx(11)
        });

        // ── Texture builder ─────────────────────────────────────────────────────
        function makeFaceTexture(img, sx, sy, sw, sh, scaleX, scaleY, side, flipX = false, flipY = false) {
            const maxSize = 1024;
            let ix = Math.round(sx * scaleX), iy = Math.round(sy * scaleY);
            let iw = Math.round(sw * scaleX), ih = Math.round(sh * scaleY);
            if (iw <= 0 || ih <= 0) return new THREE.Texture();

            const sourceAspect = iw / ih;
            let texSizeW, texSizeH;
            if (sourceAspect > 1) { texSizeW = maxSize; texSizeH = Math.max(1, Math.round(maxSize / sourceAspect)); }
            else { texSizeH = maxSize; texSizeW = Math.max(1, Math.round(maxSize * sourceAspect)); }

            const cvs = document.createElement("canvas");
            cvs.width = texSizeW; cvs.height = texSizeH;
            const ctx = cvs.getContext("2d");
            ctx.imageSmoothingQuality = "high";
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, texSizeW, texSizeH);

            let srcX = ix, srcY = iy, srcW = iw, srcH = ih;
            const clipLeft = Math.max(0, -srcX);
            const clipTop = Math.max(0, -srcY);
            const clipRight = Math.max(0, srcX + srcW - img.width);
            const clipBottom = Math.max(0, srcY + srcH - img.height);
            let destX = (clipLeft / iw) * texSizeW;
            let destY = (clipTop / ih) * texSizeH;
            let destW = texSizeW - ((clipLeft + clipRight) / iw) * texSizeW;
            let destH = texSizeH - ((clipTop + clipBottom) / ih) * texSizeH;
            srcX += clipLeft; srcY += clipTop;
            srcW -= clipLeft + clipRight;
            srcH -= clipTop + clipBottom;

            if (srcW > 0 && srcH > 0 && destW > 0 && destH > 0) {
                ctx.save();
                if (flipX) { ctx.scale(-1, 1); ctx.translate(-texSizeW, 0); destX = texSizeW - destX - destW; }
                if (flipY) { ctx.scale(1, -1); ctx.translate(0, -texSizeH); destY = texSizeH - destY - destH; }
                ctx.drawImage(img, srcX, srcY, srcW, srcH, destX, destY, destW, destH);
                ctx.restore();
            }

            const tex = new THREE.CanvasTexture(cvs);
            tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
            tex.minFilter = tex.magFilter = THREE.LinearFilter;
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.needsUpdate = true;
            return tex;
        }

        // ── Mitered backfold geometry ────────────────────────────────────────────
        function createMiteredBackfoldGeometry(isVertical, mainSize, foldSize, flipped = false) {
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const uvs = [];
            const m = foldSize;

            if (isVertical) {
                positions.push(
                    0, -mainSize / 2, 0,
                    m, -mainSize / 2 + m, 0,
                    m, mainSize / 2 - m, 0,
                    0, mainSize / 2, 0
                );

                let uv = [
                    0, 0,
                    1, m / mainSize,
                    1, 1 - m / mainSize,
                    0, 1
                ];

                if (flipped) {
                    uv = [
                        1, 0,
                        0, m / mainSize,
                        0, 1 - m / mainSize,
                        1, 1
                    ];
                }
                uvs.push(...uv);
            } else {
                positions.push(
                    -mainSize / 2, 0, 0,
                    -mainSize / 2 + m, m, 0,
                    mainSize / 2 - m, m, 0,
                    mainSize / 2, 0, 0
                );

                let uv = [
                    0, 0,
                    m / mainSize, 1,
                    1 - m / mainSize, 1,
                    1, 0
                ];

                if (flipped) {
                    uv = [
                        0, 1,
                        m / mainSize, 0,
                        1 - m / mainSize, 0,
                        1, 1
                    ];
                }
                uvs.push(...uv);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            geometry.setIndex([0, 1, 2, 0, 2, 3]);
            geometry.computeVertexNormals();
            return geometry;
        }

        function disposeMaterial(material) {
            if (!material) return;
            if (material.map) material.map.dispose();
            material.dispose();
        }

        function disposeWrapGroup(group) {
            const materials = new Set();

            group.traverse((child) => {
                if (!child.isMesh) return;
                if (child.geometry) child.geometry.dispose();

                if (Array.isArray(child.material)) {
                    child.material.forEach(material => materials.add(material));
                } else if (child.material) {
                    materials.add(child.material);
                }
            });

            materials.forEach(disposeMaterial);
        }

        function addFrameBar(group, width, height, depth, x, y, z, material) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), material);
            mesh.position.set(x, y, z);
            group.add(mesh);
        }

        function addOuterFrame(group, canvasWidth, canvasHeight, canvasDepth, ratio, frameColor) {
            const faceWidth = FRAME_SPEC.frontFacePx / ratio / 100;
            const profileDepth = FRAME_SPEC.sideDepthPx / ratio / 100;
            const backBorderWidth = FRAME_SPEC.backBorderPx / ratio / 100;
            const backLipDepth = Math.min(FRAME_SPEC.innerDepthPx / ratio / 100, profileDepth);
            const canvasGap = FRAME_SPEC.canvasGapPx / ratio / 100;
            const hookLength = Math.min(FRAME_SPEC.hookLengthPx / ratio / 100, canvasWidth * 0.7);
            const hookOffset = FRAME_SPEC.hookOffsetPx / ratio / 100;
            const hookHeight = Math.max(backLipDepth, 0.03);
            const hookDepth = Math.max(0.012, Math.min(backLipDepth * 0.22, 0.05));

            const frontOpeningWidth = canvasWidth + canvasGap * 2;
            const frontOpeningHeight = canvasHeight + canvasGap * 2;
            const outerWidth = frontOpeningWidth + faceWidth * 2;
            const outerHeight = frontOpeningHeight + faceWidth * 2;
            const backOpeningWidth = Math.max(0.001, outerWidth - backBorderWidth * 2);
            const frameFrontZ = canvasDepth / 2;
            const frameCenterZ = frameFrontZ - profileDepth / 2;
            const frameBackZ = frameFrontZ - profileDepth;
            const backLipCenterZ = frameBackZ + backLipDepth / 2;
            const hookCenterZ = frameBackZ + hookDepth / 2 + 0.002;
            const hookCenterY = outerHeight / 2 - hookOffset - hookHeight / 2;

            const frameBaseColor = new THREE.Color(frameColor || "#171717");
            const backLipColor = frameBaseColor.clone().multiplyScalar(0.78);
            const hookColor = new THREE.Color(0xc9d1d9);

            const frameMaterial = new THREE.MeshStandardMaterial({
                color: frameBaseColor,
                roughness: 0.92,
                metalness: 0.08
            });

            const backLipMaterial = new THREE.MeshStandardMaterial({
                color: backLipColor,
                roughness: 0.96,
                metalness: 0.03
            });

            const hookMaterial = new THREE.MeshStandardMaterial({
                color: hookColor,
                roughness: 0.42,
                metalness: 0.55
            });

            addFrameBar(group, faceWidth, outerHeight, profileDepth, -outerWidth / 2 + faceWidth / 2, 0, frameCenterZ, frameMaterial);
            addFrameBar(group, faceWidth, outerHeight, profileDepth, outerWidth / 2 - faceWidth / 2, 0, frameCenterZ, frameMaterial);
            addFrameBar(group, frontOpeningWidth, faceWidth, profileDepth, 0, outerHeight / 2 - faceWidth / 2, frameCenterZ, frameMaterial);
            addFrameBar(group, frontOpeningWidth, faceWidth, profileDepth, 0, -outerHeight / 2 + faceWidth / 2, frameCenterZ, frameMaterial);

            addFrameBar(group, backBorderWidth, outerHeight, backLipDepth, -outerWidth / 2 + backBorderWidth / 2, 0, backLipCenterZ, backLipMaterial);
            addFrameBar(group, backBorderWidth, outerHeight, backLipDepth, outerWidth / 2 - backBorderWidth / 2, 0, backLipCenterZ, backLipMaterial);
            addFrameBar(group, backOpeningWidth, backBorderWidth, backLipDepth, 0, outerHeight / 2 - backBorderWidth / 2, backLipCenterZ, backLipMaterial);
            addFrameBar(group, backOpeningWidth, backBorderWidth, backLipDepth, 0, -outerHeight / 2 + backBorderWidth / 2, backLipCenterZ, backLipMaterial);

            addFrameBar(group, hookLength, hookHeight, hookDepth, 0, hookCenterY, hookCenterZ, hookMaterial);
        }

        function updateThreePreview() {
            if (!imageURL || !loadedImg || loadedImg.naturalWidth === 0) return;
            disposeWrapGroup(wrapGroup);
            wrapGroup.clear();
            currentMesh = null;

            const ratio = Math.max(0.1, +ratioInput.value || 1);
            const depth = +depthInput.value || 40;
            const backFold = +backFoldInput.value || 25;
            const frontOuterW = +fWidthInput.value || 900;
            const frontOuterH = +fHeightInput.value || 600;

            // ── FIXED CALCULATION USING FRAME PROFILE (as per image dimensions) ──
            // Front outer size minus 2×(front face + canvas gap) gives the actual canvas front size.
            // All values are scaled by the preview ratio exactly as requested.
            // Canvas sizing remains independent from the external frame.
            const fW = (frontOuterW - 2 * depth) / ratio;
            const fH = (frontOuterH - 2 * depth) / ratio;
            const d = depth / ratio;
            const bf = Math.min(backFold, depth) / ratio;

            const canvasWidth = fW / 100;
            const canvasHeight = fH / 100;
            const canvasDepth = d / 100;
            const hw = canvasWidth / 2, hh = canvasHeight / 2, hd = canvasDepth / 2;

            let effW, effH;
            if (useCustomSize.checked) {
                effW = +canvasImgWidthInput.value || origW;
                effH = +canvasImgHeightInput.value || origH;
            } else {
                const fitScale = Math.max(frontOuterW / ratio / origW, frontOuterH / ratio / origH);
                effW = origW * fitScale * (+scaleInput.value || 1);
                effH = origH * fitScale * (+scaleInput.value || 1);
            }
            if (effW < 10 || effH < 10 || origW === 0) return;

            const offsetX = (+leftOffsetInput.value || 0) / ratio;
            const offsetY = (+topOffsetInput.value || 0) / ratio;
            const scaleX = origW / effW;
            const scaleY = origH / effH;

            // ── Wooden stretcher bars (A=26mm from image) ─────────────────────
            const woodMaterial = new THREE.MeshStandardMaterial({
                color: 0x8b5a2b,
                roughness: 0.7,
                metalness: 0.0,
                polygonOffset: true,
                polygonOffsetFactor: 1,
                polygonOffsetUnits: 1
            });

            // Use A=26mm (stretcher bar thickness) scaled by ratio – independent of backFold
            const woodThickness = 26 / ratio / 100;   // ← A=26mm from image
            const woodDepth = hd;
            const woodHeight = fH / 100;
            const woodWidth = fW / 100;

            const woodZ = 0;
            const EPS = 0.00001;

            // Left vertical bar
            const leftWood = new THREE.Mesh(new THREE.BoxGeometry(woodThickness, woodHeight, woodDepth), woodMaterial);
            leftWood.position.set(-hw + woodThickness / 2, 0, -EPS);
            wrapGroup.add(leftWood);

            // Right vertical bar
            const rightWood = new THREE.Mesh(new THREE.BoxGeometry(woodThickness, woodHeight, woodDepth), woodMaterial);
            rightWood.position.set(hw - woodThickness / 2, 0, -EPS);
            wrapGroup.add(rightWood);

            // Top horizontal bar
            const topWood = new THREE.Mesh(new THREE.BoxGeometry(woodWidth, woodThickness, woodDepth), woodMaterial);
            topWood.position.set(0, hh - woodThickness / 2, -EPS);
            wrapGroup.add(topWood);

            // Bottom horizontal bar
            const bottomWood = new THREE.Mesh(new THREE.BoxGeometry(woodWidth, woodThickness, woodDepth), woodMaterial);
            bottomWood.position.set(0, -hh + woodThickness / 2, -EPS);
            wrapGroup.add(bottomWood);

            // ── Main face textures ──
            const texFront = makeFaceTexture(loadedImg, offsetX + d, offsetY + d, fW, fH, scaleX, scaleY, 'FRONT');
            const texLeft = makeFaceTexture(loadedImg, offsetX, offsetY + d, d, fH, scaleX, scaleY, 'LEFT');
            const texRight = makeFaceTexture(loadedImg, offsetX + d + fW, offsetY + d, d, fH, scaleX, scaleY, 'RIGHT');
            const texTop = makeFaceTexture(loadedImg, offsetX + d, offsetY, fW, d, scaleX, scaleY, 'TOP');
            const texBottom = makeFaceTexture(loadedImg, offsetX + d, offsetY + d + fH, fW, d, scaleX, scaleY, 'BOTTOM');

            // ── Back fold textures ──
            const texBackLeft = makeFaceTexture(loadedImg, offsetX - bf, offsetY + d, bf, fH, scaleX, scaleY, 'BACKLEFT', false, false);
            const texBackRight = makeFaceTexture(loadedImg, offsetX + d + fW + d, offsetY + d, bf, fH, scaleX, scaleY, 'BACKRIGHT', false, false);
            const texBackTop = makeFaceTexture(loadedImg, offsetX + d, offsetY - bf, fW, bf, scaleX, scaleY, 'BACKTOP', false, false);
            const texBackBottom = makeFaceTexture(loadedImg, offsetX + d, offsetY + d + fH + d, fW, bf, scaleX, scaleY, 'BACKBOTTOM', false, false);

            const zOffset = -0.001;
            const backFaceZ = -hd / 2;

            // ── Left backfold ──
            const geoLeft = createMiteredBackfoldGeometry(true, fH / 100, bf / 100, true);
            const leftMesh = new THREE.Mesh(geoLeft, new THREE.MeshStandardMaterial({ map: texBackLeft, side: THREE.DoubleSide }));
            leftMesh.position.set(-hw, 0, backFaceZ + zOffset);
            wrapGroup.add(leftMesh);

            // ── Right backfold ──
            const geoRight = createMiteredBackfoldGeometry(true, fH / 100, bf / 100, false);
            const rightMesh = new THREE.Mesh(geoRight, new THREE.MeshStandardMaterial({ map: texBackRight, side: THREE.DoubleSide }));
            rightMesh.position.set(hw, 0, backFaceZ + zOffset);
            rightMesh.rotation.y = Math.PI;
            wrapGroup.add(rightMesh);

            // ── Top backfold ──
            const geoTop = createMiteredBackfoldGeometry(false, fW / 100, bf / 100, false);
            const topMesh = new THREE.Mesh(geoTop, new THREE.MeshStandardMaterial({ map: texBackTop, side: THREE.DoubleSide }));
            topMesh.position.set(0, hh, backFaceZ + zOffset);
            topMesh.rotation.x = Math.PI;
            wrapGroup.add(topMesh);

            // ── Bottom backfold ──
            const geoBottom = createMiteredBackfoldGeometry(false, fW / 100, bf / 100, true);
            const bottomMesh = new THREE.Mesh(geoBottom, new THREE.MeshStandardMaterial({ map: texBackBottom, side: THREE.DoubleSide }));
            bottomMesh.position.set(0, -hh, backFaceZ + zOffset);
            wrapGroup.add(bottomMesh);

            // ── Main box ──
            const geometry = new THREE.BoxGeometry(canvasWidth, canvasHeight, canvasDepth);
            const materials = [
                new THREE.MeshStandardMaterial({ map: texRight }),
                new THREE.MeshStandardMaterial({ map: texLeft }),
                new THREE.MeshStandardMaterial({ map: texTop }),
                new THREE.MeshStandardMaterial({ map: texBottom }),
                new THREE.MeshStandardMaterial({ map: texFront }),
                new THREE.MeshStandardMaterial({ visible: false })
            ];
            currentMesh = new THREE.Mesh(geometry, materials);
            wrapGroup.add(currentMesh);

            addOuterFrame(wrapGroup, canvasWidth, canvasHeight, canvasDepth, ratio, frameColorInput.value);

            wrapGroup.rotation.y = -0.35;
            wrapGroup.rotation.x = 0.18;
        }

        // ── Events ──────────────────────────────────────────────────────────────
        upload.addEventListener("change", e => {
            const file = e.target.files[0];
            if (!file) return;
            imageURL = URL.createObjectURL(file);
            const img = new Image();
            img.onload = () => {
                origW = img.naturalWidth; origH = img.naturalHeight;
                aspect = origH / origW || 1;
                imgWidthInput.value = origW; imgHeightInput.value = origH;
                canvasImgWidthInput.value = origW; canvasImgHeightInput.value = origH;
                loadedImg = img;
                updateThreePreview();
            };
            img.src = imageURL;
        });

        function syncAspectWidth() { if (lockAspect.checked) imgHeightInput.value = Math.round(imgWidthInput.value * aspect); }
        function syncAspectHeight() { if (lockAspect.checked) imgWidthInput.value = Math.round(imgHeightInput.value / aspect); }
        function syncCanvasWidth() { if (lockAspect.checked) canvasImgHeightInput.value = Math.round(canvasImgWidthInput.value * aspect); updateThreePreview(); }
        function syncCanvasHeight() { if (lockAspect.checked) canvasImgWidthInput.value = Math.round(canvasImgHeightInput.value / aspect); updateThreePreview(); }
        imgWidthInput.addEventListener("input", syncAspectWidth);
        imgHeightInput.addEventListener("input", syncAspectHeight);
        canvasImgWidthInput.addEventListener("input", syncCanvasWidth);
        canvasImgHeightInput.addEventListener("input", syncCanvasHeight);

        [fWidthInput, fHeightInput, depthInput, ratioInput, scaleInput, leftOffsetInput, topOffsetInput, useCustomSize, backFoldInput, frameColorInput]
            .forEach(el => el.addEventListener("input", () => { updateThreePreview(); }));

        let isDragging = false, previousMouse = { x: 0, y: 0 };
        container.addEventListener("pointerdown", e => { isDragging = true; previousMouse.x = e.clientX; previousMouse.y = e.clientY; container.style.cursor = "grabbing"; });
        window.addEventListener("pointerup", () => { isDragging = false; container.style.cursor = "grab"; });
        window.addEventListener("pointermove", e => {
            if (!isDragging || !wrapGroup || isPinching) return;

            wrapGroup.rotation.y += (e.clientX - previousMouse.x) * 0.004;
            wrapGroup.rotation.x += (e.clientY - previousMouse.y) * 0.004;

            previousMouse.x = e.clientX;
            previousMouse.y = e.clientY;
        });

        container.addEventListener("selectstart", e => e.preventDefault());
        container.addEventListener("wheel", e => {
            e.preventDefault();
            camera.fov = THREE.MathUtils.clamp(camera.fov + e.deltaY * 0.06, 20, 110);
            camera.updateProjectionMatrix();
        }, { passive: false });
        window.addEventListener("resize", () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
    </script>
</body>

</html>
